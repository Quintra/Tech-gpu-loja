<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Tech GPU - Login Interno</title>
</head>
<body>
    <section id="login-container">
        <div class="login-box">
            <div class="tech-gpu-header" style="border: none; text-align: center; margin-bottom: 20px;">
                <span class="tech-tag">ACESSO RESTRITO</span>
                <h2>TECH <span class="highlight">GPU</span></h2>
            </div>
            <form id="login-form">
                <input type="text" id="user" placeholder="Usuário" required>
                <input type="password" id="pass" placeholder="Senha" required>
                <button type="submit" class="btn-primary">Entrar no Sistema</button>
            </form>
            <a href="caca.html" class="btn-voltar" style="display:block; margin-top:15px; text-decoration:none; text-align:center;">Cadastrar Novo Técnico</a>
        </div>
    </section>

<form id="login-form">
    <input type="text" id="user" placeholder="Usuário" required>
    <input type="password" id="pass" placeholder="Senha" required>
    <button type="submit" class="btn-primary">Entrar no Sistema</button>
</form>

<script>
    document.querySelector('form').onsubmit = function(e) {
        e.preventDefault();
        const inputs = this.querySelectorAll('input');
        const userIn = inputs[0].value;
        const passIn = inputs[1].value;

        // Recupera técnicos cadastrados no caca.html
        const equipe = JSON.parse(localStorage.getItem('techGpuEquipe')) || [];
        const tecnico = equipe.find(t => t.user === userIn && t.pass === passIn);

        // Permite entrar se for o admin padrão ou um técnico da lista
        if (tecnico || (userIn === "admin" && passIn === "123")) {
            localStorage.setItem('loginAtivo', userIn);
            window.location.href = 'dashboard.html';
        } else {
            alert("Usuário ou senha incorretos!");
        }
    };
</script>
</body>
</html>
